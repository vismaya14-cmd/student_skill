{% extends 'base.html' %}

{% block title %}SkillHub - Request Help{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-7 mx-auto">
        <div class="card p-4 shadow">
            <div class="d-flex align-items-center mb-4">
                <div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3">
                    <i class="fas fa-bullhorn text-warning fs-3"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0">Request Help</h2>
                    <p class="text-secondary small mb-0">Ask for the skills you need.</p>
                </div>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-bold small text-warning text-uppercase">Request Title</label>
                    {{ form.title }}
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-warning text-uppercase">Skill Category</label>
                        {{ form.category }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-warning text-uppercase">Budget (Optional)</label>
                        {{ form.budget }}
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold small text-warning text-uppercase">Help Needed</label>
                    {{ form.description }}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning btn-lg py-3 fw-bold">Post Request</button>
                    <a href="{% url 'requests_hub' %}" class="btn btn-link text-dim text-decoration-none">Back to Requests</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
