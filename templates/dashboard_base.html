<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkillHub Dashboard{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        body {
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Fixed Dashboard Layout */
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }
        
        .dashboard-sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            transition: transform 0.3s ease;
        }

        .dashboard-main {
            flex: 1;
            margin-left: 280px;
            padding: 3rem;
            width: calc(100% - 280px);
            background: #f1f5f9;
            min-height: 100vh;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.25rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-link-custom:hover {
            background: #f8fafc;
            color: #2563eb;
        }

        .nav-link-custom.active {
            background: #eff6ff !important;
            color: #2563eb !important;
            font-weight: 600;
        }
        
        @media (max-width: 992px) {
            .dashboard-sidebar { transform: translateX(-100%); width: 0; }
            .dashboard-main { margin-left: 0; width: 100%; padding: 1.5rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <a href="{% url 'home' %}" class="brand-logo">
                <i class="fas fa-rocket"></i> SkillHub
            </a>
            
            <nav class="flex-grow-1">
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="{% url 'dashboard' %}" class="nav-link-custom {% if request.path == '/dashboard/' %}active{% endif %}">
                            <i class="fas fa-th-large"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'services' %}" class="nav-link-custom {% if request.path == '/services/' %}active{% endif %}">
                            <i class="fas fa-tools"></i> Services
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'inbox' %}" class="nav-link-custom {% if request.path == '/inbox/' %}active{% endif %}">
                            <i class="fas fa-inbox"></i> Inbox
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'dashboard' %}" class="nav-link-custom {% if request.path == '/payments/' %}active{% endif %}">
                            <i class="fas fa-wallet"></i> Payments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'profile' user.username %}" class="nav-link-custom {% if '/profile/' in request.path %}active{% endif %}">
                            <i class="fas fa-user-circle"></i> Profile
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="pt-4 border-top">
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="nav-link-custom border-0 bg-transparent w-100 text-start text-danger">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
